name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            platform: darwin-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            platform: darwin-x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-x86_64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: mofa-cli
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: mofa-cli
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/mofa dist/
          cd dist && tar czf mofa-${{ matrix.platform }}.tar.gz mofa
          shasum -a 256 mofa-${{ matrix.platform }}.tar.gz > mofa-${{ matrix.platform }}.tar.gz.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: mofa-${{ matrix.platform }}
          path: mofa-cli/dist/mofa-${{ matrix.platform }}.tar.gz*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create checksums
        run: cat *.sha256 > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            mofa-*.tar.gz
            checksums.txt
          generate_release_notes: true
